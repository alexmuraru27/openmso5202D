; PlatformIO project — combined analog + logic-analyzer test generator for the
; MSO5202D. Drives a serial protocol on CH1/CH2 (GPIO22/23) AND all 16 LA
; channels (distinct frequency each) at the same time, so one acquisition can
; capture analog CH1/CH2 and the logic pod together.
;
;   CH1 = GPIO22   CH2 = GPIO23   (scope analog probes)
;   LA D0..D15 = 13,12,14,27,26,25,33,32,15,2,4,16,17,5,18,19  (logic pod)
;
; Build/flash:  pio run -t upload
; Serial log:   pio device monitor   (115200 baud — prints the pin map + JSON status)
;
; Protocol AND frequency are switchable AT RUNTIME over the 115200 serial console
; (see scripts/mso5202d_espgen.py). -DPROTO only picks the power-on DEFAULT:
;   build_flags = -DPROTO=0   ; SPI  (default)
;   build_flags = -DPROTO=1   ; UART
;   build_flags = -DPROTO=2   ; I2C

[env:esp32-wroom]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Uncomment to pick the power-on DEFAULT protocol (runtime-switchable regardless):
; build_flags = -DPROTO=0
