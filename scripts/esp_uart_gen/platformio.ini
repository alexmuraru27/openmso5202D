; PlatformIO project — UART test-signal generator for the MSO5202D serial decoder.
; Target: ESP-WROOM-32 (classic ESP32-S DevKitC, 38-pin clone). Bit-bangs an 8N1
; UART line streaming the 0x00..0xFF ramp for the scope to decode.
;
;   TX = GPIO13 -> scope CH1   (CH2 unused)
;
; Build/flash:  pio run -t upload      (auto-detects the USB port)
; Serial log:   pio device monitor     (115200 baud — prints the pin map)
;
; Baud is selectable at build time (default 9600):
;   build_flags = -DBAUD=115200

[env:esp32-wroom]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Uncomment to change baud (match the decoder's --baud):
; build_flags = -DBAUD=9600
