; PlatformIO project — LA test-signal generator for the MSO5202D logic analyzer.
; Target: ESP-WROOM-32 (classic ESP32-S dev board, e.g. the AliExpress 38-pin
; DevKitC clone). Drives all 16 LA channels with identifiable patterns so each
; physical line can be told apart when decoding the scope's LA.
;
; Build/flash:  pio run -t upload      (auto-detects the USB port)
; Serial log:   pio device monitor     (115200 baud — prints the pin/freq map)
;
; Pattern is selected at build time (default = distinct frequency per channel):
;   PATTERN=0  FREQ    — each channel a unique square wave, f_N = 1000/(N+1) Hz
;   PATTERN=1  COUNTER — 16-bit binary counter, channel N = counter bit N

[env:esp32-wroom]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Uncomment to build the binary-counter pattern instead:
; build_flags = -DPATTERN=1
