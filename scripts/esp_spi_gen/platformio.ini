; PlatformIO project — SPI test-signal generator for the MSO5202D serial decoder.
; Target: ESP-WROOM-32 (classic ESP32-S DevKitC, 38-pin clone). Bit-bangs an SPI
; master (SCLK + MOSI) streaming the 0x00..0xFF ramp for the scope to decode.
;
;   SCLK = GPIO13 -> scope CH1        MOSI = GPIO14 -> scope CH2
;
; Build/flash:  pio run -t upload      (auto-detects the USB port)
; Serial log:   pio device monitor     (115200 baud — prints the pin map)
;
; Clock mode is selectable at build time (default = mode 0, CPOL=0 CPHA=0):
;   build_flags = -DCPOL=1 -DCPHA=1    ; e.g. build for mode 3

[env:esp32-wroom]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Uncomment to change SPI mode (must match the decoder's --cpol/--cpha):
; build_flags = -DCPOL=0 -DCPHA=0
