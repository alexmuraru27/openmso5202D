; PlatformIO project — I2C test-signal generator for the MSO5202D serial decoder.
; Target: ESP-WROOM-32 (classic ESP32-S DevKitC, 38-pin clone). Bit-bangs a
; synthetic I2C master (SCL + SDA, self-ACK, push-pull) streaming short write
; transactions of the 0x00..0xFF ramp for the scope to decode.
;
;   SCL = GPIO13 -> scope CH1        SDA = GPIO14 -> scope CH2
;
; Build/flash:  pio run -t upload      (auto-detects the USB port)
; Serial log:   pio device monitor     (115200 baud — prints the pin map)

[env:esp32-wroom]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
